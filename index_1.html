<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W XYZ® Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F4F2EA;      /* PDF'in kirik beyaz zemini */
    --ink:#22343A;
    --ink-soft:#5C6E72;
    --line:#DDD9C8;
    --teal:#1E5B58;       /* koyu yesil-teal: baslik rengi */
    --purple:#6C3FA4;     /* Eat. Drink. Different. moru */
    --lime:#AFC93A;       /* "let's drink" fistik yesili */
    --header-text:#F4F2EA;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Poppins',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- header ---------- */
  header{
    background:var(--teal);
    color:var(--header-text);
    text-align:center;
    padding:40px 20px 0;
  }
  header .eyebrow{
    font-size:11px;
    letter-spacing:.3em;
    text-transform:uppercase;
    opacity:.7;
    margin-bottom:8px;
  }
  header h1{
    font-family:'Caveat',cursive;
    font-weight:700;
    font-size:52px;
    line-height:1;
    letter-spacing:.04em;
  }
  header .tagline{
    margin-top:22px;
    background:var(--purple);
    color:#fff;
    font-weight:600;
    font-size:14px;
    letter-spacing:.35em;
    text-transform:none;
    padding:12px 10px;
    word-spacing:.4em;
  }
  header .sub{
    background:var(--paper);
    color:var(--ink-soft);
    font-size:12px;
    padding:10px 16px 0;
  }

  /* ---------- sticky category nav ---------- */
  nav{
    position:sticky;
    top:0;
    z-index:10;
    background:var(--paper);
    border-bottom:2px solid var(--teal);
    overflow-x:auto;
    white-space:nowrap;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  nav::-webkit-scrollbar{display:none}
  nav .inner{padding:0 14px;display:inline-block}
  nav a{
    display:inline-block;
    padding:13px 11px 11px;
    font-size:13px;
    font-weight:600;
    color:var(--ink-soft);
    text-decoration:none;
    border-bottom:3px solid transparent;
  }
  nav a.active{
    color:var(--teal);
    border-bottom-color:var(--lime);
  }

  /* ---------- menu body ---------- */
  main{max-width:660px;margin:0 auto;padding:6px 20px 60px}
  section{padding-top:36px}
  section h2{
    font-family:'Caveat',cursive;
    font-weight:700;
    font-size:34px;
    color:var(--teal);
    line-height:1;
  }
  section h2 .underline{
    display:block;
    width:56px;
    height:4px;
    background:var(--lime);
    border-radius:2px;
    margin-top:4px;
  }
  .cat-note{
    font-size:12px;
    color:var(--ink-soft);
    margin-top:8px;
    font-style:italic;
  }
  .dual-head{
    display:flex;
    justify-content:flex-end;
    gap:0;
    margin-top:12px;
    font-size:10.5px;
    font-weight:600;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--ink-soft);
  }
  .dual-head span{width:74px;text-align:right}

  .item{
    padding:15px 0 13px;
    border-bottom:1px dashed var(--line);
  }
  .item:last-child{border-bottom:none}
  .item .row{
    display:flex;
    align-items:baseline;
    gap:8px;
  }
  .item .name{
    font-size:14.5px;
    font-weight:600;
    color:var(--ink);
  }
  .item .leader{
    flex:1;
    border-bottom:1px dotted #C4BFA8;
    transform:translateY(-3px);
    min-width:14px;
  }
  .item .price{
    font-size:14px;
    font-weight:600;
    color:var(--teal);
    white-space:nowrap;
    font-variant-numeric:tabular-nums;
  }
  .item .price.dual{display:flex;gap:0}
  .item .price.dual span{width:74px;text-align:right}
  .item .desc{
    margin-top:4px;
    font-size:12.5px;
    line-height:1.55;
    color:var(--ink-soft);
    font-style:italic;
    max-width:56ch;
  }
  .item .story{
    margin-top:4px;
    font-size:12px;
    line-height:1.6;
    color:var(--ink-soft);
    max-width:60ch;
  }
  .item .style{
    display:inline-block;
    margin-top:6px;
    font-size:10.5px;
    font-weight:600;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--purple);
  }
  .item.soldout .name,
  .item.soldout .price{opacity:.4;text-decoration:line-through}
  .item.soldout .desc,.item.soldout .story{opacity:.4}
  .badge{
    display:inline-block;
    font-size:10px;
    font-weight:600;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:#fff;
    background:var(--lime);
    border-radius:99px;
    padding:2px 9px;
    margin-left:6px;
    vertical-align:2px;
  }

  footer{
    text-align:center;
    padding:30px 20px 46px;
    border-top:2px solid var(--teal);
  }
  footer .brand{
    font-family:'Caveat',cursive;
    font-size:26px;
    color:var(--teal);
    font-weight:700;
  }
  footer .note{
    margin-top:8px;
    font-size:11.5px;
    color:var(--ink-soft);
  }

  .error{
    max-width:640px;
    margin:60px auto;
    padding:0 20px;
    text-align:center;
    color:var(--ink-soft);
    font-size:14px;
    line-height:1.6;
  }

  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto}
  }
  @media (max-width:380px){
    .dual-head span,.item .price.dual span{width:64px}
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow" id="hdr-eyebrow"></div>
  <h1 id="hdr-title">W XYZ®</h1>
  <div class="tagline" id="hdr-tagline"></div>
  <div class="sub" id="hdr-sub"></div>
</header>

<nav id="catnav" hidden><div class="inner" id="catnav-inner"></div></nav>

<main id="menu"></main>

<footer id="menu-footer" hidden>
  <div class="brand" id="ftr-brand"></div>
  <div class="note" id="ftr-note"></div>
</footer>

<script>
(async function(){
  const main = document.getElementById('menu');
  let data;
  try{
    const res = await fetch('menu.json?v=' + Date.now()); // her acilista taze veri
    if(!res.ok) throw new Error(res.status);
    data = await res.json();
  }catch(e){
    main.innerHTML = '<div class="error">Menu could not be loaded.<br>Please refresh the page.</div>';
    return;
  }

  if(data.eyebrow)  document.getElementById('hdr-eyebrow').textContent = data.eyebrow;
  if(data.title){
    document.getElementById('hdr-title').textContent = data.title;
    document.title = data.title + ' — Menu';
  }
  if(data.tagline)  document.getElementById('hdr-tagline').textContent = data.tagline;
  if(data.subtitle) document.getElementById('hdr-sub').textContent = data.subtitle;

  const cur = data.currency || 'TL';
  const slug = s => s.toLowerCase()
      .replaceAll('ş','s').replaceAll('ç','c').replaceAll('ğ','g')
      .replaceAll('ü','u').replaceAll('ö','o').replaceAll('ı','i')
      .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');

  const nav = document.getElementById('catnav');
  const navInner = document.getElementById('catnav-inner');
  (data.categories||[]).forEach(cat=>{
    const a = document.createElement('a');
    a.href = '#' + slug(cat.name);
    a.textContent = cat.name;
    navInner.appendChild(a);
  });
  nav.hidden = !(data.categories||[]).length;

  (data.categories||[]).forEach(cat=>{
    const dual = !!cat.dual; // kadeh/sise cift fiyat
    const sec = document.createElement('section');
    sec.id = slug(cat.name);
    let html = '<h2>'+esc(cat.name)+'<span class="underline"></span></h2>';
    if(cat.note) html += '<div class="cat-note">'+esc(cat.note)+'</div>';
    if(dual) html += '<div class="dual-head"><span>'+esc(cat.col1||'Glass')+'</span><span>'+esc(cat.col2||'Bottle')+'</span></div>';
    (cat.items||[]).forEach(it=>{
      const cls = it.soldout ? 'item soldout' : 'item';
      let priceHtml;
      if(dual){
        priceHtml = '<span class="price dual"><span>'+fmt(it.glass)+'</span><span>'+fmt(it.bottle)+'</span></span>';
      }else{
        priceHtml = '<span class="price">'+fmt(it.price)+'</span>';
      }
      html += '<div class="'+cls+'">'
        + '<div class="row"><span class="name">'+esc(it.name)
        + (it.badge ? '<span class="badge">'+esc(it.badge)+'</span>' : '')
        + '</span><span class="leader"></span>' + priceHtml + '</div>'
        + (it.story ? '<div class="story">'+esc(it.story)+'</div>' : '')
        + (it.desc ? '<div class="desc">'+esc(it.desc)+'</div>' : '')
        + (it.style ? '<span class="style">Style: '+esc(it.style)+'</span>' : '')
        + '</div>';
    });
    sec.innerHTML = html;
    main.appendChild(sec);
  });

  if(data.footer || data.footerBrand){
    const f = document.getElementById('menu-footer');
    document.getElementById('ftr-brand').textContent = data.footerBrand || '';
    document.getElementById('ftr-note').textContent = data.footer || '';
    f.hidden = false;
  }

  function fmt(v){
    if(v === undefined || v === null || v === '') return '—';
    return esc(String(v)) + ' ' + esc(cur);
  }

  const links = [...navInner.querySelectorAll('a')];
  const secs  = [...main.querySelectorAll('section')];
  const spy = () => {
    let idx = 0;
    secs.forEach((s,i)=>{ if(s.getBoundingClientRect().top < 130) idx = i; });
    links.forEach((l,i)=>l.classList.toggle('active', i===idx));
    const act = links[idx];
    if(act) act.scrollIntoView({block:'nearest', inline:'center', behavior:'auto'});
  };
  document.addEventListener('scroll', spy, {passive:true});
  spy();

  function esc(s){
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }
})();
</script>
</body>
</html>
