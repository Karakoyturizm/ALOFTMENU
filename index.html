<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menü</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF8F2;
    --ink:#2B241C;
    --ink-soft:#6E6355;
    --line:#E4DCCE;
    --accent:#8A6A2F;      /* saffron-bronze */
    --accent-deep:#5C4720;
    --header:#1F2A24;      /* bottle green */
    --header-text:#F4EFE4;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- header ---------- */
  header{
    background:var(--header);
    color:var(--header-text);
    text-align:center;
    padding:42px 20px 34px;
  }
  header .eyebrow{
    font-size:11px;
    letter-spacing:.28em;
    text-transform:uppercase;
    color:var(--header-text);
    opacity:.65;
    margin-bottom:10px;
  }
  header h1{
    font-family:'Cormorant Garamond',serif;
    font-weight:600;
    font-size:34px;
    line-height:1.1;
  }
  header .sub{
    margin-top:10px;
    font-size:13px;
    opacity:.75;
  }

  /* ---------- sticky category nav ---------- */
  nav{
    position:sticky;
    top:0;
    z-index:10;
    background:var(--paper);
    border-bottom:1px solid var(--line);
    overflow-x:auto;
    white-space:nowrap;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  nav::-webkit-scrollbar{display:none}
  nav .inner{padding:0 14px;display:inline-block}
  nav a{
    display:inline-block;
    padding:14px 12px 12px;
    font-size:13.5px;
    font-weight:500;
    color:var(--ink-soft);
    text-decoration:none;
    border-bottom:2px solid transparent;
  }
  nav a.active{
    color:var(--accent-deep);
    border-bottom-color:var(--accent);
  }

  /* ---------- menu body ---------- */
  main{max-width:640px;margin:0 auto;padding:8px 20px 60px}
  section{padding-top:34px}
  section h2{
    font-family:'Cormorant Garamond',serif;
    font-weight:700;
    font-size:26px;
    color:var(--accent-deep);
    display:flex;
    align-items:center;
    gap:14px;
  }
  section h2::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--line);
  }
  .cat-note{
    font-size:12.5px;
    color:var(--ink-soft);
    margin-top:4px;
    font-style:italic;
  }
  .item{
    padding:16px 0 14px;
    border-bottom:1px dashed var(--line);
  }
  .item:last-child{border-bottom:none}
  .item .row{
    display:flex;
    align-items:baseline;
    gap:8px;
  }
  .item .name{
    font-size:15.5px;
    font-weight:600;
  }
  .item .leader{
    flex:1;
    border-bottom:1px dotted #C9BFA9;
    transform:translateY(-3px);
  }
  .item .price{
    font-size:15px;
    font-weight:600;
    color:var(--accent-deep);
    white-space:nowrap;
    font-variant-numeric:tabular-nums;
  }
  .item .desc{
    margin-top:5px;
    font-size:13px;
    line-height:1.55;
    color:var(--ink-soft);
    max-width:52ch;
  }
  .item.soldout .name,
  .item.soldout .price{opacity:.4;text-decoration:line-through}
  .item.soldout .desc{opacity:.4}
  .badge{
    display:inline-block;
    font-size:10px;
    font-weight:600;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:var(--accent-deep);
    border:1px solid var(--accent);
    border-radius:99px;
    padding:2px 8px;
    margin-left:6px;
    vertical-align:2px;
  }

  footer{
    text-align:center;
    padding:26px 20px 44px;
    font-size:12px;
    color:var(--ink-soft);
    border-top:1px solid var(--line);
  }

  .error{
    max-width:640px;
    margin:60px auto;
    padding:0 20px;
    text-align:center;
    color:var(--ink-soft);
    font-size:14px;
    line-height:1.6;
  }

  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto}
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow" id="hdr-eyebrow"></div>
  <h1 id="hdr-title">Menü</h1>
  <div class="sub" id="hdr-sub"></div>
</header>

<nav id="catnav" hidden><div class="inner" id="catnav-inner"></div></nav>

<main id="menu"></main>

<footer id="menu-footer" hidden></footer>

<script>
(async function(){
  const main = document.getElementById('menu');
  let data;
  try{
    const res = await fetch('menu.json?v=' + Date.now()); // cache'i atla, her zaman güncel veri
    if(!res.ok) throw new Error(res.status);
    data = await res.json();
  }catch(e){
    main.innerHTML = '<div class="error">Menü şu anda yüklenemedi.<br>Lütfen sayfayı yenileyin.</div>';
    return;
  }

  // başlık
  if(data.eyebrow) document.getElementById('hdr-eyebrow').textContent = data.eyebrow;
  if(data.title)   document.getElementById('hdr-title').textContent = data.title;
  if(data.subtitle)document.getElementById('hdr-sub').textContent = data.subtitle;
  if(data.title)   document.title = data.title + ' — Menü';

  const cur = data.currency || '₺';
  const slug = s => s.toLowerCase()
      .replaceAll('ş','s').replaceAll('ç','c').replaceAll('ğ','g')
      .replaceAll('ü','u').replaceAll('ö','o').replaceAll('ı','i')
      .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');

  // kategori navigasyonu
  const nav = document.getElementById('catnav');
  const navInner = document.getElementById('catnav-inner');
  (data.categories||[]).forEach(cat=>{
    const a = document.createElement('a');
    a.href = '#' + slug(cat.name);
    a.textContent = cat.name;
    navInner.appendChild(a);
  });
  nav.hidden = !(data.categories||[]).length;

  // menü gövdesi
  (data.categories||[]).forEach(cat=>{
    const sec = document.createElement('section');
    sec.id = slug(cat.name);
    let html = '<h2>'+esc(cat.name)+'</h2>';
    if(cat.note) html += '<div class="cat-note">'+esc(cat.note)+'</div>';
    (cat.items||[]).forEach(it=>{
      const cls = it.soldout ? 'item soldout' : 'item';
      html += '<div class="'+cls+'">'
        + '<div class="row"><span class="name">'+esc(it.name)
        + (it.badge ? '<span class="badge">'+esc(it.badge)+'</span>' : '')
        + '</span><span class="leader"></span>'
        + '<span class="price">'+esc(String(it.price))+' '+esc(cur)+'</span></div>'
        + (it.desc ? '<div class="desc">'+esc(it.desc)+'</div>' : '')
        + '</div>';
    });
    sec.innerHTML = html;
    main.appendChild(sec);
  });

  // alt bilgi
  if(data.footer){
    const f = document.getElementById('menu-footer');
    f.textContent = data.footer;
    f.hidden = false;
  }

  // scroll ile aktif kategori vurgusu
  const links = [...navInner.querySelectorAll('a')];
  const secs  = [...main.querySelectorAll('section')];
  const spy = () => {
    let idx = 0;
    secs.forEach((s,i)=>{ if(s.getBoundingClientRect().top < 120) idx = i; });
    links.forEach((l,i)=>l.classList.toggle('active', i===idx));
    const act = links[idx];
    if(act) act.scrollIntoView({block:'nearest', inline:'center', behavior:'auto'});
  };
  document.addEventListener('scroll', spy, {passive:true});
  spy();

  function esc(s){
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }
})();
</script>
</body>
</html>
